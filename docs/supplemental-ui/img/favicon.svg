<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Hydra mark: a transit roundel. The ring is the "line", the bar carries the
       station name. Three stops on the bar nod to State / Event / Action. -->
  <rect width="64" height="64" rx="14" fill="#0b1020"/>
  <circle cx="32" cy="32" r="18" fill="none" stroke="#16b3a6" stroke-width="6"/>
  <rect x="8" y="28" width="48" height="8" rx="4" fill="#0d7d76"/>
  <circle cx="18" cy="32" r="3" fill="#ffd23f"/>
  <circle cx="32" cy="32" r="3" fill="#f7f5ef"/>
  <circle cx="46" cy="32" r="3" fill="#ff6b5e"/>
</svg>
