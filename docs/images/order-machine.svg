<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="800" viewBox="0 0 1180 800" font-family="'Inter','Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444b5a"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#D63333"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A9E95"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#E0A500"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6A2FB0"/>
    </marker>
  </defs>

  <rect width="1180" height="800" fill="#ffffff"/>

  <!-- title -->
  <text x="40" y="44" font-size="26" font-weight="700" fill="#1B1B2F">Hydra Order Machine &#8212; a Mealy Machine</text>
  <text x="40" y="74" font-size="15" fill="#5b6472">Every edge reads <tspan font-weight="700" fill="#1B1B2F">Event / Action</tspan> &#8212; the EVENT you push in, then the ACTION the machine emits out.</text>

  <!-- star accent -->
  <g transform="translate(1090,70)">
    <path fill="#FF9F1C" stroke="#FF6B6B" stroke-width="3" stroke-linejoin="round"
      d="M0,-52 L11,-16 L48,-16 L18,6 L29,42 L0,20 L-29,42 L-18,6 L-48,-16 L-11,-16 Z"/>
    <text x="0" y="5" font-size="13" font-weight="700" fill="#3A1F00" text-anchor="middle">MEALY</text>
  </g>

  <!-- ===== edges (drawn first, behind nodes) ===== -->
  <!-- START -> Cart -->
  <line x1="150" y1="170" x2="150" y2="222" stroke="#444b5a" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- Cart -> Placed : Checkout / ChargeCard -->
  <line x1="250" y1="300" x2="450" y2="300" stroke="#D63333" stroke-width="4" marker-end="url(#arrowRed)"/>
  <text x="350" y="288" font-size="15" font-weight="600" fill="#1B1B2F" text-anchor="middle">Checkout / ChargeCard</text>
  <!-- Placed -> Shipped : PaymentSucceeded / ShipParcel -->
  <line x1="650" y1="300" x2="850" y2="300" stroke="#1A9E95" stroke-width="4" marker-end="url(#arrowTeal)"/>
  <text x="750" y="288" font-size="15" font-weight="600" fill="#1B1B2F" text-anchor="middle">PaymentSucceeded / ShipParcel</text>
  <!-- Placed -> Cancelled : PaymentFailed (dashed = no action) -->
  <line x1="550" y1="380" x2="550" y2="560" stroke="#E0A500" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#arrowGold)"/>
  <text x="565" y="478" font-size="15" font-weight="600" fill="#1B1B2F" text-anchor="start">PaymentFailed</text>
  <text x="565" y="498" font-size="12" font-style="italic" fill="#8a6d00" text-anchor="start">(no action)</text>
  <!-- Shipped -> Cancelled : Cancel / RefundCard -->
  <path d="M950,380 L950,620 L660,620" fill="none" stroke="#6A2FB0" stroke-width="4" marker-end="url(#arrowPurple)"/>
  <text x="950" y="600" font-size="15" font-weight="600" fill="#1B1B2F" text-anchor="middle">Cancel / RefundCard</text>
  <!-- Cancelled -> END -->
  <line x1="550" y1="718" x2="550" y2="742" stroke="#444b5a" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- ===== nodes ===== -->
  <!-- START -->
  <rect x="90" y="120" width="120" height="50" rx="25" fill="#1B1B2F"/>
  <text x="150" y="151" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">START</text>

  <!-- Cart -->
  <circle cx="150" cy="300" r="78" fill="#FF6B6B" stroke="#D63333" stroke-width="5"/>
  <text x="150" y="308" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">Cart</text>

  <!-- Placed -->
  <circle cx="550" cy="300" r="78" fill="#4ECDC4" stroke="#1A9E95" stroke-width="5"/>
  <text x="550" y="308" font-size="24" font-weight="700" fill="#06302C" text-anchor="middle">Placed</text>

  <!-- Shipped -->
  <circle cx="950" cy="300" r="78" fill="#FFD93D" stroke="#E0A500" stroke-width="5"/>
  <text x="950" y="308" font-size="23" font-weight="700" fill="#3A2E00" text-anchor="middle">Shipped</text>

  <!-- Cancelled -->
  <circle cx="550" cy="640" r="78" fill="#9B5DE5" stroke="#6A2FB0" stroke-width="5"/>
  <text x="550" y="648" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Cancelled</text>

  <!-- END -->
  <rect x="490" y="744" width="120" height="48" rx="24" fill="#1B1B2F"/>
  <text x="550" y="774" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">END</text>

  <!-- legend -->
  <rect x="60" y="470" width="340" height="150" rx="10" fill="#F4F4FB" stroke="#9B5DE5" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="80" y="500" font-size="15" font-weight="700" fill="#1B1B2F">LEGEND</text>
  <text x="80" y="526" font-size="13" fill="#1B1B2F"><tspan font-weight="700">Circle</tspan> = State (where the order is)</text>
  <text x="80" y="548" font-size="13" fill="#1B1B2F"><tspan font-weight="700">Event</tspan> = input you push in</text>
  <text x="80" y="570" font-size="13" fill="#1B1B2F"><tspan font-weight="700">Action</tspan> = command emitted out</text>
  <text x="80" y="592" font-size="13" fill="#1B1B2F"><tspan font-weight="700">Dashed edge</tspan> = emits no action</text>
</svg>
